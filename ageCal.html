<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main_box{
            display: flex;
            flex-direction: column;
            row-gap: 20px;
            justify-content: center;
            align-items: center;
        }
        .label_input_box{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="main_box">
        <div>
            <div class="label_input_box">
                <label for="">Date of Birth : </label>
                <input type="text" placeholder="Enter..">
            </div>
            <p>Enter date of birth in the format of : YYYY-MM-DD</p>
        </div>
        <div>
            <button onclick="ageCalculator()">Calculate</button>
        </div>
        <div class="ageBox">

        </div>
    </div>

    <script>

        const currentTime = Date.now()

        const myBirthTime = new Date(2008,12,20).getTime()
        console.log(myBirthTime)
        console.log(currentTime)

        let diff = currentTime - myBirthTime;
        console.log(`years : ${ Math.floor(diff/(1000*60*60*24*365))}`)
        console.log(`years : ${ Math.ceil((Math.floor(diff%(1000*60*60*24*365)))/(1000*60*60*24*30))}`)
        console.log(`months : ${ Math.floor(diff/(1000*60*60*24*30.3))}`)
        console.log(`days : ${ Math.floor(diff/(1000*60*60*24))}`)
        console.log(`years : ${ Math.floor(diff/(1000*60*60*24*365))}`)

    </script>
    
</body>
</html>
