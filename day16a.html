<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            gap: 20px;
        }
        .each_box{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            border: 1px solid rgb(37, 48, 43);
            font-size: 100px;
        }
    </style>
</head>
<body>
    <div class="container">

    </div>
    <script>
        const container = document.querySelector(".container")
        const box1 = document.createElement('div')
        box1.innerText = "1"
        box1.classList.add("each_box")
        container.appendChild(box1)

        const box2 = document.createElement('div')
        box2.innerText = "2"
        box2.classList.add("each_box")
        container.appendChild(box2)

        const box3 = document.createElement('div')
        box3.innerText = "3"
        box3.classList.add("each_box")
        container.appendChild(box3)


    </script>
</body>
</html>
